<div class="login-container">
  <h2>Sign In</h2>

  <div *ngIf="isAuthenticated; else loginFormTemplate">
    <p class="signed-in-message">You are signed in.</p>
    <button mat-raised-button color="warn" (click)="onSignOut()" [disabled]="isLoading">
      <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
      Sign Out
    </button>
  </div>

  <ng-template #loginFormTemplate>

    <ng-container *ngIf="oauthStrategies.length > 0">
      <div class="social-row">
        <button *ngFor="let strategy of oauthStrategies"
                class="social-btn"
                (click)="onOAuthSignIn(strategy)"
                [disabled]="isLoading"
                [matTooltip]="'Continue with ' + getProviderLabel(strategy)"
                matTooltipPosition="above"
                [attr.aria-label]="'Continue with ' + getProviderLabel(strategy)">

          <!-- GitHub -->
          <ng-container *ngIf="strategy === 'oauth_github'">
            <svg viewBox="0 0 16 16" width="22" height="22" fill="currentColor" aria-hidden="true">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
          </ng-container>

          <!-- Google -->
          <ng-container *ngIf="strategy === 'oauth_google'">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
          </ng-container>

          <!-- Apple -->
          <ng-container *ngIf="strategy === 'oauth_apple'">
            <svg viewBox="-145 129 220 256" width="20" height="20" fill="currentColor" aria-hidden="true">
              <path d="M75,316.8c-6,13.3-8.9,19.3-16.6,31c-10.8,16.4-26,36.9-44.9,37.1c-16.8,0.2-21.1-10.9-43.8-10.8
	c-22.7,0.1-27.5,11-44.3,10.8c-18.9-0.2-33.3-18.7-44.1-35.1c-30.2-46-33.4-99.9-14.7-128.6c13.2-20.4,34.1-32.3,53.8-32.3
	c20,0,32.5,11,49.1,11c16,0,25.8-11,48.9-11c17.5,0,36,9.5,49.2,26C24.3,238.6,31.3,300.3,75,316.8L75,316.8z M0.8,170.6
	c8.4-10.8,14.8-26,12.5-41.6c-13.7,0.9-29.8,9.7-39.1,21.1c-8.5,10.3-15.5,25.6-12.8,40.5C-23.7,191.1-8.2,182.1,0.8,170.6
	L0.8,170.6z"/>
            </svg>
          </ng-container>

          <!-- Microsoft -->
          <ng-container *ngIf="strategy === 'oauth_microsoft'">
            <svg viewBox="0 0 21 21" width="22" height="22" aria-hidden="true">
              <rect x="0" y="0" width="10" height="10" fill="#f25022"/>
              <rect x="11" y="0" width="10" height="10" fill="#7fba00"/>
              <rect x="0" y="11" width="10" height="10" fill="#00a4ef"/>
              <rect x="11" y="11" width="10" height="10" fill="#ffb900"/>
            </svg>
          </ng-container>

          <!-- Fallback: provider initial -->
          <ng-container *ngIf="strategy !== 'oauth_github' && strategy !== 'oauth_google' && strategy !== 'oauth_apple' && strategy !== 'oauth_microsoft'">
            <span class="social-fallback-initial" aria-hidden="true">{{ getProviderLabel(strategy).charAt(0).toUpperCase() }}</span>
          </ng-container>

        </button>
      </div>

      <div class="divider-row">
        <mat-divider></mat-divider>
        <span class="divider-label">or</span>
        <mat-divider></mat-divider>
      </div>
    </ng-container>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" />
        <mat-error *ngIf="email?.hasError('required')">Email is required.</mat-error>
        <mat-error *ngIf="email?.hasError('email')">Enter a valid email address.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="current-password" />
        <mat-error *ngIf="password?.hasError('required')">Password is required.</mat-error>
      </mat-form-field>

      <p *ngIf="errorMessage" class="error-message" role="alert">{{ errorMessage }}</p>

      <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid || isLoading" class="full-width">
        <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
        Sign In
      </button>
    </form>

  </ng-template>
</div>
