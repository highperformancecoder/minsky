<H2><A ID="SECTION004211000000000000000"></A><A ID="Operation:differentiate"></A>
<BR>

 STYLE="height: 2.38ex; vertical-align: -0.70ex; " SRC="img17.png"
 ALT="$d/dt$% WIDTH=61 HEIGHT=34 ">
</H2>

producing d/dt[input].  For further explanation regarding
